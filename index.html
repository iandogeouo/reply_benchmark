<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>擬答評測系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">📋</div>
  <h1>擬答評測系統</h1>
  <span>v0.1</span>
  <div class="header-tabs">
    <button class="tab-btn active" onclick="switchTab('single')">單筆評測</button>
    <button class="tab-btn" onclick="switchTab('batch')">批次評測</button>
    <button class="tab-btn" onclick="switchTab('records')">📁 紀錄</button>
  </div>
</header>

<div class="container">

  <!-- ══════════════════════════════ 共用：模型設定 ══════════════════════════ -->
  <div class="card">
    <div class="section-title">模型設定</div>
    <div class="api-row">
      <div>
        <label>Judge 模型</label>
        <select id="modelSelect">
          <option value="openai/gpt-oss-120b">openai/gpt-oss-120b</option>
          <option value="gemma-4-31b-it">Gemma 4 (Google)</option>
        </select>
      </div>
      <div>
        <label>評估維度</label>
        <div class="checkbox-group">
          <label class="checkbox-item checked" id="cb-completeness">
            <input type="checkbox" checked>
            <div class="checkbox-dot"></div>
            回復完整性
          </label>
          <label class="checkbox-item checked" id="cb-tone">
            <input type="checkbox" checked>
            <div class="checkbox-dot"></div>
            語調風格
          </label>
          <label class="checkbox-item checked" id="cb-fidelity">
            <input type="checkbox" checked>
            <div class="checkbox-dot"></div>
            忠實性
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════ 單筆評測 ══════════════════════════════ -->
  <div id="page-single" class="page active">

    <!-- 輸入區 -->
    <div class="card">
      <div class="section-title">輸入</div>
      <div class="grid-2" style="margin-bottom:16px;">
        <div>
          <label>市民陳情內容</label>
          <textarea id="inputPetition" placeholder="貼上市民陳情的內容..."></textarea>
        </div>
        <div id="civilField">
          <label>公務員想回答的內容</label>
          <textarea id="inputCivil" placeholder="貼上公務員提供的回答重點或草稿..."></textarea>
        </div>
      </div>
      <div>
        <label>擬答內容（AI 生成）</label>
        <textarea id="inputReply" placeholder="貼上 AI 生成的建議回覆..." style="min-height:100px;"></textarea>
      </div>
      <div style="display:flex; gap:10px; margin-top:16px; align-items:center;">
        <button class="btn btn-primary" id="btnEval" onclick="runSingleEval()">
          ▶ 開始評測
        </button>
        <button class="btn btn-secondary" onclick="clearSingle()">清除</button>
        <div class="loading" id="loadingSingle">
          <div class="spinner"></div>
          <span id="loadingText">正在評估中...</span>
        </div>
      </div>
    </div>

    <!-- 結果區 -->
    <div id="resultArea">
      <div class="section-title">評測結果</div>
      <div class="score-grid" id="scoreGrid"></div>
      <div id="detailBlocks"></div>
    </div>

  </div>

  <!-- ══════════════════════════════ 批次評測 ══════════════════════════════ -->
  <div id="page-batch" class="page">

    <div class="card">
      <div class="section-title">上傳 CSV</div>
      <p style="font-size:12px; color:var(--fg3); margin-bottom:16px;">
        CSV 需包含欄位：
        <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;">陳情內容</code>、
        <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;">公務員輸入</code>、
        <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;">擬答內容</code>
      </p>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📂</div>
        <div><strong>點擊上傳</strong> 或拖曳 CSV 到這裡</div>
        <p>支援 .csv 格式</p>
      </div>
      <input type="file" id="fileInput" accept=".csv" style="display:none" onchange="handleFileUpload(event)">
    </div>

    <div class="batch-controls" id="batchControls">
      <button class="btn btn-primary" id="btnBatchRun" onclick="runBatch()" disabled>
        ▶ 開始批次評測
      </button>
      <button class="btn btn-secondary" onclick="exportCSV()" id="btnExport" disabled>
        ↓ 匯出結果
      </button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span id="progressText">準備中...</span>
        <span id="progressCount" style="font-family:var(--mono); color:var(--accent);">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div id="batchSummary" style="display:none"></div>

    <div class="table-wrap">
      <table id="batchTable">
        <thead>
          <tr>
            <th>#</th>
            <th>陳情內容</th>
            <th>公務員輸入</th>
            <th>擬答內容</th>
            <th>完整性</th>
            <th>忠實性</th>
            <th>語調風格</th>
            <th>狀態</th>
          </tr>
        </thead>
        <tbody id="batchTableBody">
          <tr>
            <td colspan="8">
              <div class="empty">
                <div class="empty-icon">📋</div>
                <p>上傳 CSV 以開始批次評測</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <!-- ══════════════════════════════ 評測紀錄 ══════════════════════════════ -->
  <div id="page-records" class="page">

    <!-- 統計摘要 -->
    <div class="stats-bar" id="recordsStats" style="display:none">
      <div class="stat-item">
        <div class="stat-value" id="statCount">—</div>
        <div class="stat-label">評測紀錄</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">總評測筆數</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statCompleteness">—</div>
        <div class="stat-label">平均完整性</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statFidelity">—</div>
        <div class="stat-label">平均忠實性</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statTone">—</div>
        <div class="stat-label">平均語調風格</div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <h2>歷史紀錄</h2>
        <button class="btn btn-secondary" onclick="loadRecords()">↻ 重新整理</button>
      </div>
      <div class="card-bd" id="recordsList">
        <div class="empty">
          <div class="empty-icon">📭</div>
          <p>還沒有任何紀錄</p>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ── Detail modal ── -->
<div class="modal-backdrop" id="detailModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">詳細分析</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modalContent" style="margin-bottom: 24px;"></div>
      <div class="score-grid" id="modalScoreGrid"></div>
      <div id="modalDetailBlocks"></div>
    </div>
  </div>
</div>

<!-- ── Record detail modal ── -->
<div class="modal-backdrop" id="recordModal" onclick="closeRecordModal(event)">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h2 id="recordModalTitle">紀錄詳細</h2>
      <button class="modal-close" onclick="closeRecordModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="recordModalStats" style="margin-bottom:16px"></div>
      <div class="table-wrap">
        <table id="recordModalTable">
          <thead>
            <tr>
              <th>#</th>
              <th>陳情內容</th>
              <th>完整性</th>
              <th>忠實性</th>
              <th>語調風格</th>
            </tr>
          </thead>
          <tbody id="recordModalBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer"></div>

<!-- ── Confirm dialog ── -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-body" style="padding:28px;text-align:center">
      <div id="confirmText" style="font-size:15px;font-weight:600;color:var(--fg);margin-bottom:8px"></div>
      <div id="confirmSub" style="font-size:13px;color:var(--fg3);margin-bottom:24px"></div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-secondary" id="confirmCancel">取消</button>
        <button class="btn" id="confirmOk" style="background:var(--danger);color:white">刪除</button>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
